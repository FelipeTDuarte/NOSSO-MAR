env:
  n_wec: 5
  farm_bounds: [[0, 2000], [0, 2000]]
  min_wec_spacing: 50.0
  episode_length: 200
  device_properties:
    radius: 3.0; draft: 3.0; mass: 50000; Bpto: 30000

agent_cfg:
  hidden: 256; lr_actor: 1.0e-4; lr_critic: 3.0e-4
  tau: 0.01; gamma: 0.99; max_position_delta: 50.0

maddpg_cfg:
  buffer_size: 1000000; batch_size: 256

n_episodes: 10000; episode_len: 200; update_every: 50

reward:
  type: multi_objective
  weights:
    power: 1.0; fatigue: -0.2; env_impact: -0.05; grid_stability: 0.1
