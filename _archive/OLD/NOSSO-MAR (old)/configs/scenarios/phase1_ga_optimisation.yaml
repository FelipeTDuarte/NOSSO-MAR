scenario:
  name: phase1_ga_layout_optimisation

ga:
  population_size: 50; n_generations: 200
  mutation_rate: 0.1; crossover_rate: 0.8
  bounds: [[0,2000],[0,2000]]

no_models:
  wave_propagation: outputs/wave_no/wave_no_final.pt
  bem_surrogate:    outputs/bem_surrogate/bem_surrogate_final.pt

wave_conditions:
  - {Hs: 2.0, Tp: 8.0, direction: 0.0,  weight: 0.4}
  - {Hs: 3.0, Tp: 10.0, direction: 30.0, weight: 0.3}
  - {Hs: 1.5, Tp: 6.0, direction: -15.0, weight: 0.3}
