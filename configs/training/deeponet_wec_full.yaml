# Training config: DeepONet / PI-DeepONet / GNO for F1A — FULL 4-STAGE PIPELINE
#
# Implements the 4-stage training progression from spec 09:
#   Stage A: synthetic/analytic baseline — hardens interfaces and loss implementation
#   Stage B: open-data conditioning — adds real forcing and benchmark context
#   Stage C: physics-informed training — PI-DeepONet with residual losses
#   Stage D: high-fidelity bridge calibration — sparse CFD cases for regularization
#
# Operators: deeponet, physics_deeponet, gno (factory.py)
# Dataset:   data/phase1_wec_f1a1.zarr (Capytaine), data/phase1_wec_f1a2.zarr
 
# ── Stage A — Synthetic baseline ─────────────────────────────────────────────
# Purpose: harden interfaces, validate loss functions, confirm physics constraints
# Data: analytic WEC generator (analytic_wec.py) — lightweight and deterministic
stage_a:
  name:     analytic_interface_hardening
  operator: deeponet
  dataset:
    source:  analytic                # src/nossomar/data/analytic_wec.py
    n_samples: 500
    seed:    42
    freq:    {start: 0.05, stop: 2.5, count: 100}
 
  architecture:
    branch_input_dim: 10             # analytic_wec.py: BRANCH_DIM = 10
    trunk_input_dim:  7              # analytic_wec.py: TRUNK_DIM = 7
    hidden_dim:       128
    n_hidden:         3
    output_dim:       4              # A(ω), B(ω), Re(Fex), Im(Fex)
    p:                64
 
  training:
    epochs:         100
    batch_size:     32
    lr:             1.0e-3
    scheduler:      cosine
    early_stopping_patience: 20
 
  loss:
    supervised_weight: 1.0
    physics_weight:    0.0           # no physics loss yet — Stage A is interface check
    terms:             [A_omega, B_omega, Fex_real, Fex_imag]
 
  acceptance_criteria:
    val_rmse_pct_max: 10.0           # relaxed — Stage A is not the quality bar
    loss_finite:      true
    B_violations:     0              # even in Stage A, no negative damping
 
  artifacts:
    checkpoint: checkpoints/stage_a_deeponet.pt
    metrics:    checkpoints/stage_a_metrics.json
 
# ── Stage B — Open-data conditioning ─────────────────────────────────────────
# Purpose: introduce real forcing context, calibrate normalization
# Data: Capytaine F1A1 dataset + open-data spectral context (NDBC/COOPS)
stage_b:
  name:     capytaine_open_data_conditioning
  operator: deeponet
  resume_from: checkpoints/stage_a_deeponet.pt
 
  dataset:
    source:   data/phase1_wec_f1a1.zarr   # Capytaine BEM, 1000 cases
    open_data_context:
      ndbc:   data/open_database/downloads/ndbc/41009.txt
      coops:  data/open_database/downloads/coops/
      role:   spectral_forcing_context     # NOT training labels
 
  training:
    epochs:         200
    batch_size:     32
    lr:             5.0e-4              # reduced — fine-tuning from Stage A
    scheduler:      cosine
    warmup_epochs:  10
    early_stopping_patience: 30
 
  loss:
    supervised_weight:   1.0
    physics_weight:      0.05           # introduce gently
    cross_fidelity_weight: 0.02
    terms:               [A_omega, B_omega, Fex_real, Fex_imag, power_consistency]
 
  acceptance_criteria:
    val_A_rmse_pct_max:  7.0            # tighter than Stage A
    val_B_rmse_pct_max:  7.0
    B_violations:        0
 
  artifacts:
    checkpoint: checkpoints/stage_b_deeponet.pt
    metrics:    checkpoints/stage_b_metrics.json
 
# ── Stage C — Physics-informed training ──────────────────────────────────────
# Purpose: enforce physical constraints as hard training signal
# Data: same Capytaine dataset — physics loss activates curriculum
stage_c:
  name:     physics_informed_deeponet
  operator: physics_deeponet          # PI-DeepONet — factory.py: PhysicsInformedDeepONet
  resume_from: checkpoints/stage_b_deeponet.pt
 
  architecture:
    branch_input_dim:  10
    trunk_input_dim:   7
    hidden_dim:        128
    n_hidden:          3
    output_dim:        4
    p:                 64
    pde_residual_fn:   wec_frequency_domain_residual  # residuals_torch.py
 
  training:
    epochs:         300
    batch_size:     32
    lr:             1.0e-4
    scheduler:      cosine_with_restarts
    early_stopping_patience: 40
 
  loss:
    supervised_weight:     1.0
    physics_weight:        0.1        # full physics loss — spec 03 target
    cross_fidelity_weight: 0.05
 
    curriculum:
      physics_ramp:
        start_epoch:  0
        end_epoch:    100
        start_weight: 0.0
        end_weight:   0.1             # spec 09: ramp prevents destabilization
 
    terms:
      supervised:      [A_omega, B_omega, Fex_real, Fex_imag]
      physics:         [damping_nonneg, causality, addedmass_bound, wec_frequency_domain_residual]
      cross_fidelity:  [power_consistency, response_summary]
 
    residuals_module: src/nossomar/physics/residuals_torch.py
    bridge_module:    src/nossomar/physics/multifidelity.py
 
  acceptance_criteria:                # spec 03 targets
    val_A_rmse_pct_max:    5.0
    val_B_rmse_pct_max:    5.0
    val_Fex_rmse_pct_max:  8.0
    power_rmse_pct_max:    10.0
    B_violations:          0
    generalization_gap:    0.20       # train vs val ratio < 1.20
 
  artifacts:
    checkpoint: checkpoints/stage_c_pi_deeponet.pt
    metrics:    checkpoints/stage_c_metrics.json
 
# ── Stage D — High-fidelity bridge calibration ───────────────────────────────
# Purpose: align with sparse CFD cases — final regularization and validation
# Data: 10-15 high-fidelity cases (HAMS cross-validation + CFD-derived)
stage_d:
  name:     cfd_bridge_calibration
  operator: physics_deeponet
  resume_from: checkpoints/stage_c_pi_deeponet.pt
 
  dataset:
    primary:   data/phase1_wec_f1a1.zarr
    calibration:
      hams_crossval:
        source:   data/phase1_wec_f1a1.zarr
        fraction: 0.10                # 10% cases checked vs HAMS
        bridge:   summarize_frequency_response   # multifidelity.py
      cfd_cases:
        n_cases:  15
        bridge:   cfd_snapshot_to_phase_fields   # multifidelity.py
 
  training:
    epochs:         100               # short — only calibration
    batch_size:     16                # smaller — sparse high-fidelity data
    lr:             1.0e-5            # very low — final fine-tuning
    scheduler:      constant
 
  loss:
    supervised_weight:     1.0
    physics_weight:        0.2        # highest physics weight — most constrained stage
    cross_fidelity_weight: 0.1        # CFD bridge loss active
 
  acceptance_criteria:                # final spec 03 targets
    val_A_rmse_pct_max:    5.0
    val_B_rmse_pct_max:    5.0
    power_rmse_pct_max:    10.0
    B_violations:          0
    hams_crossval_error:   5.0        # within 5% of HAMS on cross-val set
    rm3_power_error:       10.0       # RM3 benchmark: within 10% of WEC-Sim
 
  artifacts:
    checkpoint: checkpoints/deeponet_wec_f1a1_best.pt    # final artifact used by F1C
    metrics:    checkpoints/f1a_metrics.json
    conformal:  checkpoints/f1a_conformal_quantiles.json
 
# ── GNO training — Multi-body F1A2 ───────────────────────────────────────────
# Run after Stage D. Uses F1A1 Stage D weights as initialisation for branch.
stage_gno_f1a2:
  name:     gno_multibody_array
  operator: gno                       # factory.py: GraphNeuralOperator
  dataset:  data/phase1_wec_f1a2.zarr # 100 2-body array cases
 
  architecture:
    node_in_dim:  10                  # same as F1A1 branch features
    node_out_dim: 4                   # A, B, Re(Fex), Im(Fex) per device
    hidden:       64
    n_layers:     4
 
  training:
    epochs:         200
    batch_size:     16
    lr:             5.0e-4
    scheduler:      cosine
 
  loss:
    supervised_weight:   1.0
    physics_weight:      0.1
    terms:
      per_device_rmse:         true
      interaction_kernel:      true   # G_ij(ω) between device pairs
      damping_nonneg:          true
      array_power_consistency: true
 
  acceptance_criteria:
    interaction_effect_pct: [5.0, 15.0]  # power reduction in 2nd WEC
    B_violations: 0
 
  artifacts:
    checkpoint: checkpoints/gno_wec_f1a2_best.pt
    metrics:    checkpoints/f1a2_metrics.json
 
# ── Reproducibility ────────────────────────────────────────────────────────────
reproducibility:
  seed:        42
  variance_tol: 0.001                 # ±0.1% results with fixed seed (spec roadmap)
  log_dir:     runs/tensorboard/f1a/
