operator_type: wno
operator_cfg:
  in_channels:  6
  out_channels: 3
  width:        64
  levels:       3
  n_layers:     4
  activation:   gelu

data_dir:   data/processed/oceanwave3d
batch_size: 8
lr:         1.0e-3
wd:         1.0e-4
epochs:     300
output_dir: outputs/wave_no

loss:
  w_data:   1.0
  w_grad:   0.1
  w_energy: 0.05
