# Phase 1 baseline: analytic spherical WEC, open data
name:    phase1_baseline
phase:   1
status:  active

wec:
  type:    sphere
  radius:  5.0       # metres
  draft:   3.5       # metres

wave:
  Hs_range:  [0.5, 4.0]   # metres
  Tp_range:  [5.0, 15.0]  # seconds
  depth:     50.0          # metres

training:
  operator:    deeponet_wec
  n_samples:   500
  split:       [0.7, 0.15, 0.15]   # train/val/test
  config:      configs/training.yaml
